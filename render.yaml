services:
  - type: web
    name: careerpilot-ai-backend
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        value: storage/database/careerpilot.db

      - key: GROQ_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false